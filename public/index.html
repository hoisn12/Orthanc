<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orthanc</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="layout">
      <nav class="snb">
        <div class="snb-logo">OTC</div>
        <a class="snb-item active" data-page="monitor" href="#">
          <span class="snb-icon">&#9654;</span>
          <span class="snb-label">Monitor</span>
        </a>
        <a class="snb-item" data-page="tokens" href="#">
          <span class="snb-icon">&#9673;</span>
          <span class="snb-label">Tokens</span>
        </a>
        <a class="snb-item" data-page="harness" href="#">
          <span class="snb-icon">&#9881;</span>
          <span class="snb-label">Harness</span>
        </a>
        <a class="snb-item" data-page="settings" href="#" style="margin-top: auto; margin-bottom: 10px">
          <span class="snb-icon">&#9965;</span>
          <span class="snb-label">Settings</span>
        </a>
      </nav>

      <div class="main">
        <div class="header">
          <h1>Orthanc</h1>
          <div id="currentTool" class="header-tool"></div>
        </div>

        <!-- Page: Monitor -->
        <div class="page active" id="page-monitor">
          <div class="grid grid-1x2">
            <div class="panel">
              <div id="rateLimits"></div>
              <div id="sessions"></div>
              <div id="sessionConfig"></div>
            </div>
            <div class="panel">
              <div class="panel-title-row">
                <span class="panel-title" style="margin-bottom: 0; padding-bottom: 0; border-bottom: none"
                  >Activity Feed</span
                >
                <button class="hook-flow-toggle" id="toggleToolEvents">Show tool events</button>
              </div>
              <div id="feed"></div>
            </div>
          </div>
        </div>

        <!-- Page: Tokens -->
        <div class="page" id="page-tokens">
          <div class="page-scroll">
            <div id="tokenUsage"><span style="color: var(--text-muted); font-size: 12px">Loading...</span></div>
          </div>
        </div>

        <!-- Page: Harness -->
        <div class="page" id="page-harness">
          <div class="page-scroll">
            <div id="harness"><span style="color: var(--text-muted); font-size: 12px">Loading...</span></div>
          </div>
        </div>

        <!-- Page: Settings -->
        <div class="page" id="page-settings">
          <div class="page-scroll">
            <div id="settings"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Folder Picker Modal -->
    <div id="folderPickerModal" class="modal-overlay" style="display: none">
      <div class="modal folder-picker-modal">
        <div class="modal-header">
          <span class="modal-title">Select Project Folder</span>
          <button class="modal-close" id="folderPickerClose">&times;</button>
        </div>
        <div class="folder-picker-body">
          <div class="folder-picker-path-row">
            <button id="folderPickerUp" class="btn-sm btn-install">&#8593; Up</button>
            <input
              type="text"
              id="folderPickerPathInput"
              class="settings-input folder-picker-path-input"
              spellcheck="false"
            />
            <button id="folderPickerGo" class="btn-sm btn-install">Go</button>
          </div>
          <div id="folderPickerList" class="folder-picker-list"></div>
          <div class="folder-picker-actions">
            <button id="folderPickerCancel" class="btn-sm btn-uninstall">Cancel</button>
            <button id="folderPickerSelect" class="btn-sm btn-install">Select This Folder</button>
          </div>
        </div>
      </div>
    </div>

    <!-- File Viewer / Editor Dialog -->
    <dialog id="fileDialog" class="dialog">
      <div class="dialog-header">
        <span class="dialog-title" id="dialogTitle"></span>
        <div class="dialog-actions">
          <button id="dialogEditBtn" class="btn-sm" style="display: none">Edit</button>
          <button id="dialogSaveBtn" class="btn-sm btn-install" style="display: none">Save</button>
          <button id="dialogCancelBtn" class="btn-sm" style="display: none">Cancel</button>
          <button class="dialog-close" id="dialogClose">&times;</button>
        </div>
      </div>
      <div id="dialogFrontmatter" class="dialog-frontmatter" style="display: none"></div>
      <pre class="dialog-body" id="dialogBody"></pre>
      <textarea class="dialog-editor" id="dialogEditor" style="display: none"></textarea>
    </dialog>

    <!-- Create Skill Dialog -->
    <dialog id="createDialog" class="dialog">
      <div class="dialog-header">
        <span class="dialog-title" id="createDialogTitle">New Skill</span>
        <div class="dialog-actions">
          <button id="createSaveBtn" class="btn-sm btn-install">Create</button>
          <button id="createCancelBtn" class="btn-sm">Cancel</button>
        </div>
      </div>
      <div id="createForm" class="dialog-frontmatter"></div>
      <textarea class="dialog-editor" id="createEditor" placeholder="Content..."></textarea>
    </dialog>

    <script src="/vendor/marked.umd.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
